<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DragonClaw Agent Desktop Client for OpenClaw</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; }
      #app { width: 100%; height: 100vh; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="main.ts"></script>
    <script>
      window.dragEvent = null;
      window.addEventListener('error', function(e) {
        if (e.message.includes('dragEvent')) { e.preventDefault(); return; }
        if (e.message && e.message.includes('ResizeObserver')) { e.preventDefault(); return; }
        console.error('Global error:', e.message);
      });
    </script>
  </body>
</html>
